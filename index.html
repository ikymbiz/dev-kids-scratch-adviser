<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Scratch AIメンター (JSON版)</title>
    <style>
        /* スタイルは前回と同じため省略（そのまま使えます） */
        body { font-family: sans-serif; background-color: #e5e9f0; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 550px; background: white; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; }
        #chat-header { background: #4d97ff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { background: #ff4d4d; border: none; color: white; padding: 5px 10px; border-radius: 10px; cursor: pointer; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; white-space: pre-wrap; font-size: 0.9em; }
        .bot { background: white; border: 2px solid #4d97ff; align-self: flex-start; }
        .user { background: #4d97ff; color: white; align-self: flex-end; }
        #input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #user-input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <span>Scratch AIメンター</span>
        <button class="reset-btn" onclick="resetChat()">最初から</button>
    </div>
    <div style="background:#fff9db; font-size:10px; padding:5px; text-align:center;">
        API Key: <input type="password" id="api-key" placeholder="Keyを入力">
    </div>
    <div id="chat-box">
        <div class="message bot">こんにちは！Scratchの先生だよ。きみの「学年」と「Scratchをどのくらいやったことがあるか」を教えてね！</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="例：小学4年生、少し知ってる">
        <button id="send-btn" onclick="handleSend()" style="border-radius:20px; border:none; background:#4d97ff; color:white; padding:0 15px;">送信</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let userPersona = "";
    let isPersonaSet = false;
    let prompts = {};

    // 1. JSONファイルを読み込む
    async function loadPrompts() {
        try {
            const response = await fetch('prompts.json');
            prompts = await response.json();
        } catch (e) {
            console.error("JSONの読み込みに失敗しました", e);
        }
    }
    loadPrompts();

    window.resetChat = function() {
        location.reload(); // 一番確実な初期化
    };

    async function handleSend() {
        const text = document.getElementById('user-input').value.trim();
        const apiKey = document.getElementById('api-key').value.trim();
        if (!text || !apiKey) return;

        addMessage(text, 'user');
        document.getElementById('user-input').value = "";
        const loadingDiv = addMessage("考え中...", 'bot');

        try {
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-3-flash" });

            let finalPrompt = "";
            if (!isPersonaSet) {
                userPersona = text;
                isPersonaSet = true;
                // JSONのテンプレートを置換
                finalPrompt = prompts.system_instructions + "\n" + 
                              prompts.persona_phase.replace("{{persona}}", userPersona);
            } else {
                finalPrompt = prompts.system_instructions + "\n" + 
                              prompts.advice_phase.replace("{{persona}}", userPersona)
                                                   .replace("{{user_input}}", text);
            }

            const result = await model.generateContent(finalPrompt);
            loadingDiv.innerText = result.response.text();
        } catch (e) {
            loadingDiv.innerText = "エラーが起きたよ: " + e.message;
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    window.handleSend = handleSend;
</script>
</body>
</html>
