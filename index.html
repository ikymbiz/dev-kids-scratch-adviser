<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, fv-scalable=no">
    <title>Scratch AI Mentor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main-blue: #4d97ff; --bg-gray: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-gray); height: 100dvh; display: flex; flex-direction: column; }
        
        /* PC/スマホ共通ヘッダー */
        header { background: var(--main-blue); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        /* レイアウト最適化 */
        #main-container { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 800px; margin: 0 auto; background: white; position: relative; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* メッセージスタイル */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 1rem; line-height: 1.5; word-wrap: break-word; }
        .bot { background: #f1f3f4; align-self: flex-start; border: 1px solid #ddd; }
        .user { background: var(--main-blue); color: white; align-self: flex-end; }

        /* 入力エリア */
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button { border: none; cursor: pointer; transition: 0.2s; }
        .btn-round { background: var(--main-blue); color: white; padding: 0 20px; border-radius: 25px; font-weight: bold; }

        /* 設定画面（オーバーレイ） */
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 20; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 14px; }

        /* PC向けの調整 */
        @media (min-width: 801px) {
            body { padding: 20px; }
            #main-container { border-radius: 15px; height: 80vh; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">Scratch AI</div>
    <div>
        <button onclick="exportLog()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:4px 8px; font-size:12px; margin-right:5px;">ログ保存</button>
        <button onclick="toggleSettings()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:4px 8px; font-size:12px;">設定</button>
    </div>
</header>

<div id="main-container">
    <div id="chat-box"></div>
    
    <div id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力...">
        <button class="btn-round" onclick="handleSend()">送信</button>
    </div>

    <div id="settings-modal">
        <h3>システム設定</h3>
        <label>Gemini API Key:</label>
        <input type="password" id="api-key" style="width:100%; margin-bottom:15px; padding:8px;">
        
        <label>システムプロンプト（AIの性格）:</label>
        <textarea id="sys-prompt">あなたはScratch専門の先生です。回答は3行以内で短く、年齢に合わせた漢字を使ってください。</textarea>
        
        <label>自己紹介フェーズの指示:</label>
        <textarea id="persona-prompt">利用者の自己紹介: {{text}}。これを受けて、年齢に合わせた挨拶と質問をしてください。</textarea>

        <button class="btn-round" onclick="toggleSettings()" style="width:100%; padding:15px; margin-top:10px;">保存して閉じる</button>
        <button onclick="resetApp()" style="width:100%; background:#ff4d4d; color:white; border:none; padding:10px; border-radius:25px; margin-top:10px;">全データをリセット</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let chatLog = JSON.parse(localStorage.getItem('scratch_ai_logs')) || [];
    let isPersonaSet = localStorage.getItem('persona_set') === 'true';
    let wakeLock = null;

    // 初期化表示
    window.onload = () => {
        chatLog.forEach(m => addMessage(m.text, m.sender, false));
        if(chatLog.length === 0) addMessage("こんにちは！きみの学年とスクラッチの経験を教えてね。", 'bot');
        requestWakeLock(); // スリープ防止開始
    };

    // 画面スリープ防止
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Wake Lock active');
            }
        } catch (err) { console.error(`${err.name}, ${err.message}`); }
    }

    // 送信処理
    window.handleSend = async () => {
        const text = document.getElementById('user-input').value.trim();
        const apiKey = document.getElementById('api-key').value;
        if(!text || !apiKey) return alert("入力またはAPIキーが足りません");

        addMessage(text, 'user');
        document.getElementById('user-input').value = "";
        const loading = addMessage("...", 'bot');

        try {
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const sys = document.getElementById('sys-prompt').value;
            let prompt = "";

            if(!isPersonaSet) {
                prompt = sys + "\n" + document.getElementById('persona-prompt').value.replace("{{text}}", text);
                isPersonaSet = true;
                localStorage.setItem('persona_set', 'true');
            } else {
                prompt = sys + "\n質問: " + text;
            }

            const result = await model.generateContent(prompt);
            const response = result.response.text();
            loading.innerText = response;
            saveLog(text, response);
        } catch (e) { loading.innerText = "エラー: " + e.message; }
    };

    function addMessage(text, sender, save = true) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        return div;
    }

    function saveLog(u, b) {
        chatLog.push({sender:'user', text:u}, {sender:'bot', text:b});
        localStorage.setItem('scratch_ai_logs', JSON.stringify(chatLog));
    }

    window.exportLog = () => {
        const data = JSON.stringify(chatLog, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `scratch_log_${new Date().getTime()}.json`;
        a.click();
    };

    window.toggleSettings = () => {
        const modal = document.getElementById('settings-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    };

    window.resetApp = () => {
        if(confirm("すべて削除しますか？")){
            localStorage.clear();
            location.reload();
        }
    };

    // PWA Service Worker 登録
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
